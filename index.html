<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>С Днём Рождения!</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px;
      text-align: center;
      color: #333;
    }

    #maze-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    h1 {
      font-size: 1.2rem;
      color: #4a4a4a;
    }

    .mode-buttons {
      display: flex;
      gap: 10px;
    }

    .btn {
      background: #ffffff;
      border: 2px solid #6c5ce7;
      color: #6c5ce7;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .btn.active {
      background: #6c5ce7;
      color: #ffffff;
    }

    #maze-container {
      position: relative;
      background-color: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      padding: 8px;
      touch-action: none;
    }

    canvas {
      display: block;
      border-radius: 8px;
      max-width: 90vw;
      max-height: 70vh;
    }

    .hint {
      font-size: 0.85rem;
      color: #666;
    }

    #greeting-screen {
      display: none;
      max-width: 500px;
      width: 90%;
      background: rgba(255, 255, 255, 0.95);
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      animation: fadeIn 0.8s ease-in-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .photo {
      width: 100%;
      max-width: 320px;
      height: auto;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      margin: 15px 0;
      object-fit: cover;
    }

    .music-btn {
      background: linear-gradient(135deg, #6c5ce7 0%, #a6c1ee 100%);
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 1.05rem;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(108, 92, 231, 0.35);
      margin: 15px 0 5px 0;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: transform 0.15s ease;
    }

    .music-btn:active {
      transform: scale(0.95);
    }

    #audio-status {
      font-size: 0.8rem;
      color: #e74c3c;
      margin-top: 5px;
      display: none;
    }

    audio {
      width: 100%;
      margin-top: 15px;
      border-radius: 30px;
    }

    .message {
      font-size: 1.05rem;
      line-height: 1.5;
      color: #444;
      white-space: pre-line;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <!-- 1. ИГРОВОЙ ЭКРАН -->
  <div id="maze-screen">
    <h1>Пройди лабиринт, чтобы открыть подарок! 🎁</h1>

    <div class="mode-buttons">
      <button class="btn active" id="btn-hard" onclick="setMode('hard')">🧩 Обычный (25x35)</button>
      <button class="btn" id="btn-easy" onclick="setMode('easy')">⚡ Легкий (1x2)</button>
    </div>

    <div id="maze-container">
      <canvas id="mazeCanvas" width="375" height="525"></canvas>
    </div>
    <p class="hint">Тяни пальцем в сторону нужного прохода ✨</p>
  </div>

  <!-- 2. ЭКРАН ПОЗДРАВЛЕНИЯ -->
  <div id="greeting-screen">
    <h1>🎉 С Днём Рождения! 🎉</h1>
    
    <img src="photo.png" alt="Поздравление" class="photo">
    
    <div class="message">
      Пусть каждый день приносит радость, вдохновение и исполнение всех желаний!
      Спасибо, что ты есть ❤️
    </div>

    <!-- Кнопка включения музыки -->
    <button class="music-btn" id="playBtn" onclick="toggleAudio()">▶ Включить музыку 🎵</button>
    <div id="audio-status">Файл song.mp3 не найден! Проверь имя файла в папке.</div>

    <!-- Аудио-плеер -->
    <audio id="bgSong" src="./song.mp3" controls preload="auto"></audio>
  </div>

  <script>
    const canvas = document.getElementById('mazeCanvas');
    const ctx = canvas.getContext('2d');

    const playerImg = new Image();
    let isPlayerImgLoaded = false;
    playerImg.src = 'hero.png';
    playerImg.onload = () => { isPlayerImgLoaded = true; };

    let cols = 25;
    let rows = 35;
    let cellSize = canvas.width / cols;
    let grid = [];
    let gridPos = { x: 1, y: 0 };
    let renderPos = { x: 0, y: 0 };
    let goal = { x: cols - 2, y: rows - 1 };

    let isDragging = false;
    let gameWon = false;

    function setMode(mode) {
      if (mode === 'easy') {
        cols = 1;
        rows = 2;
        document.getElementById('btn-easy').classList.add('active');
        document.getElementById('btn-hard').classList.remove('active');
      } else {
        cols = 25;
        rows = 35;
        document.getElementById('btn-hard').classList.add('active');
        document.getElementById('btn-easy').classList.remove('active');
      }
      initGame();
    }

    function initGame() {
      cellSize = canvas.width / cols;
      grid = Array.from({ length: rows }, () => Array(cols).fill(0));

      if (cols > 1) {
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            grid[r][c] = 1;
          }
        }
        generateMaze(1, 1);
        grid[0][1] = 0;
        grid[rows - 1][cols - 2] = 0;
        gridPos = { x: 1, y: 0 };
        goal = { x: cols - 2, y: rows - 1 };
      } else {
        gridPos = { x: 0, y: 0 };
        goal = { x: 0, y: 1 };
      }

      renderPos.x = gridPos.x * cellSize + cellSize / 2;
      renderPos.y = gridPos.y * cellSize + cellSize / 2;

      gameWon = false;
    }

    function generateMaze(r, c) {
      grid[r][c] = 0;
      const dirs = [[-2, 0], [2, 0], [0, -2], [0, 2]].sort(() => Math.random() - 0.5);

      for (let [dr, dc] of dirs) {
        const nr = r + dr;
        const nc = c + dc;
        if (nr > 0 && nr < rows - 1 && nc > 0 && nc < cols - 1 && grid[nr][nc] === 1) {
          grid[r + dr / 2][c + dc / 2] = 0;
          generateMaze(nr, nc);
        }
      }
    }

    // Плавное, мягкое доведение кадров (без рывков и без отскоков)
    function animate() {
      const targetX = gridPos.x * cellSize + cellSize / 2;
      const targetY = gridPos.y * cellSize + cellSize / 2;

      // Коэффициент 0.25 дает идеальный баланс мягкого скольжения без "пружины"
      renderPos.x += (targetX - renderPos.x) * 0.25;
      renderPos.y += (targetY - renderPos.y) * 0.25;

      draw();

      if (!gameWon) {
        requestAnimationFrame(animate);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Стены
      ctx.fillStyle = '#6c5ce7';
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (grid[r][c] === 1) {
            ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
          }
        }
      }

      // Финиш
      ctx.fillStyle = '#ff7675';
      ctx.beginPath();
      ctx.arc(
        goal.x * cellSize + cellSize / 2,
        goal.y * cellSize + cellSize / 2,
        cellSize / 2.5, 0, Math.PI * 2
      );
      ctx.fill();

      // Персонаж
      const playerSize = cellSize * 1.05;
      if (isPlayerImgLoaded) {
        ctx.drawImage(
          playerImg,
          renderPos.x - playerSize / 2,
          renderPos.y - playerSize / 2,
          playerSize,
          playerSize
        );
      } else {
        ctx.fillStyle = '#00b894';
        ctx.beginPath();
        ctx.arc(renderPos.x, renderPos.y, cellSize * 0.4, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function handleMove(e) {
      if (!isDragging || gameWon) return;

      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      const touchX = (clientX - rect.left) * (canvas.width / rect.width);
      const touchY = (clientY - rect.top) * (canvas.height / rect.height);

      const currentPX = gridPos.x * cellSize + cellSize / 2;
      const currentPY = gridPos.y * cellSize + cellSize / 2;

      const dx = touchX - currentPX;
      const dy = touchY - currentPY;

      let nextX = gridPos.x;
      let nextY = gridPos.y;

      const threshold = cellSize * 0.2;

      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > threshold) nextX++;
        else if (dx < -threshold) nextX--;
      } else {
        if (dy > threshold) nextY++;
        else if (dy < -threshold) nextY--;
      }

      if (
        nextY >= 0 && nextY < rows && nextX >= 0 && nextX < cols &&
        grid[nextY][nextX] === 0
      ) {
        gridPos.x = nextX;
        gridPos.y = nextY;
        checkWin();
      }
    }

    function startDrag(e) {
      isDragging = true;
      handleMove(e);
    }

    canvas.addEventListener('mousedown', startDrag);
    canvas.addEventListener('mouseup', () => isDragging = false);
    canvas.addEventListener('mousemove', handleMove);

    canvas.addEventListener('touchstart', (e) => {
      startDrag(e);
      e.preventDefault();
    }, { passive: false });
    
    canvas.addEventListener('touchend', () => isDragging = false);
    canvas.addEventListener('touchmove', (e) => {
      handleMove(e);
      e.preventDefault();
    }, { passive: false });

    function checkWin() {
      if (gridPos.x === goal.x && gridPos.y === goal.y && !gameWon) {
        gameWon = true;

        setTimeout(() => {
          document.getElementById('maze-screen').style.display = 'none';
          document.getElementById('greeting-screen').style.display = 'block';
        }, 150);
      }
    }

    // Включение/пауза музыки
    function toggleAudio() {
      const audio = document.getElementById('bgSong');
      const btn = document.getElementById('playBtn');
      const status = document.getElementById('audio-status');

      if (audio.paused) {
        audio.play().then(() => {
          btn.innerHTML = '⏸ Пауза';
          status.style.display = 'none';
        }).catch(err => {
          console.error("Ошибка аудио:", err);
          status.style.display = 'block';
        });
      } else {
        audio.pause();
        btn.innerHTML = '▶ Включить музыку 🎵';
      }
    }

    // Инициализация
    setMode('hard');
    requestAnimationFrame(animate);
  </script>
</body>
</html>

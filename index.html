<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>С Днём Рождения!</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px;
      text-align: center;
      color: #333;
    }

    #maze-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    h1 {
      font-size: 1.2rem;
      color: #4a4a4a;
    }

    .mode-buttons {
      display: flex;
      gap: 10px;
    }

    .btn {
      background: #ffffff;
      border: 2px solid #6c5ce7;
      color: #6c5ce7;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .btn.active {
      background: #6c5ce7;
      color: #ffffff;
    }

    #maze-container {
      position: relative;
      background-color: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      padding: 8px;
      touch-action: none;
    }

    canvas {
      display: block;
      border-radius: 8px;
      max-width: 90vw;
      max-height: 60vh;
    }

    .hint {
      font-size: 0.85rem;
      color: #666;
    }

    #greeting-screen {
      display: none;
      max-width: 500px;
      width: 90%;
      background: rgba(255, 255, 255, 0.95);
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      animation: fadeIn 0.8s ease-in-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .photo {
      width: 100%;
      max-width: 320px;
      height: auto;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      margin: 15px 0;
      object-fit: cover;
    }

    .music-btn {
      background: linear-gradient(135deg, #ff7675 0%, #d63031 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 25px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(214, 48, 49, 0.3);
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .music-btn:active {
      transform: scale(0.96);
    }

    audio {
      width: 100%;
      margin-top: 15px;
      border-radius: 30px;
    }

    .message {
      font-size: 1.05rem;
      line-height: 1.5;
      color: #444;
      white-space: pre-line;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <!-- 1. ИГРОВОЙ ЭКРАН -->
  <div id="maze-screen">
    <h1>Пройди лабиринт, чтобы открыть подарок! 🎁</h1>

    <div class="mode-buttons">
      <button class="btn active" id="btn-easy" onclick="setMode('easy')">⚡ Легкий (1x2)</button>
      <button class="btn" id="btn-hard" onclick="setMode('hard')">🧩 Обычный (25x35)</button>
    </div>

    <div id="maze-container">
      <canvas id="mazeCanvas" width="300" height="400"></canvas>
    </div>
    <p class="hint">Сдвинь персонажа на красную точку ✨</p>
  </div>

  <!-- 2. ЭКРАН ПОЗДРАВЛЕНИЯ -->
  <div id="greeting-screen">
    <h1>🎉 С Днём Рождения! 🎉</h1>
    
    <img src="photo.png" alt="Поздравление" class="photo">
    
    <div class="message">
      Пусть каждый день приносит радость, вдохновение и исполнение всех желаний!
      Спасибо, что ты есть ❤️
    </div>

    <!-- Кнопка гарантированного включения музыки -->
    <button class="music-btn" onclick="playMusic()">▶ Включить музыку 🎵</button>

    <audio id="bgSong" controls preload="auto">
      <source src="song.mp3" type="audio/mpeg">
      Ваш браузер не поддерживает аудио.
    </audio>
  </div>

  <script>
    const canvas = document.getElementById('mazeCanvas');
    const ctx = canvas.getContext('2d');

    const playerImg = new Image();
    let isPlayerImgLoaded = false;
    playerImg.src = 'hero.png';
    playerImg.onload = () => { isPlayerImgLoaded = true; draw(); };

    let cols = 1;
    let rows = 2;
    let cellW = canvas.width / cols;
    let cellH = canvas.height / rows;
    let grid = [];
    let gridPos = { x: 0, y: 0 };
    let goal = { x: 0, y: 1 };

    let isDragging = false;
    let gameWon = false;

    function setMode(mode) {
      if (mode === 'easy') {
        cols = 1;
        rows = 2;
        document.getElementById('btn-easy').classList.add('active');
        document.getElementById('btn-hard').classList.remove('active');
      } else {
        cols = 25;
        rows = 35;
        document.getElementById('btn-hard').classList.add('active');
        document.getElementById('btn-easy').classList.remove('active');
      }
      initGame();
    }

    function initGame() {
      cellW = canvas.width / cols;
      cellH = canvas.height / rows;
      grid = Array.from({ length: rows }, () => Array(cols).fill(0));

      if (cols > 1) {
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            grid[r][c] = 1;
          }
        }
        generateMaze(1, 1);
        grid[0][1] = 0;
        grid[rows - 1][cols - 2] = 0;
        gridPos = { x: 1, y: 0 };
        goal = { x: cols - 2, y: rows - 1 };
      } else {
        // Легкий режим 1x2
        gridPos = { x: 0, y: 0 };
        goal = { x: 0, y: 1 };
      }

      gameWon = false;
      draw();
    }

    function generateMaze(r, c) {
      grid[r][c] = 0;
      const dirs = [[-2, 0], [2, 0], [0, -2], [0, 2]].sort(() => Math.random() - 0.5);

      for (let [dr, dc] of dirs) {
        const nr = r + dr;
        const nc = c + dc;
        if (nr > 0 && nr < rows - 1 && nc > 0 && nc < cols - 1 && grid[nr][nc] === 1) {
          grid[r + dr / 2][c + dc / 2] = 0;
          generateMaze(nr, nc);
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Стены
      ctx.fillStyle = '#6c5ce7';
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (grid[r][c] === 1) {
            ctx.fillRect(c * cellW, r * cellH, cellW, cellH);
          }
        }
      }

      // Финиш
      ctx.fillStyle = '#ff7675';
      ctx.beginPath();
      const goalCenterX = goal.x * cellW + cellW / 2;
      const goalCenterY = goal.y * cellH + cellH / 2;
      const radius = Math.min(cellW, cellH) / 3;
      ctx.arc(goalCenterX, goalCenterY, radius, 0, Math.PI * 2);
      ctx.fill();

      // Персонаж (Строго в центре текущей клетки, никаких анимаций и смещений!)
      const px = gridPos.x * cellW + cellW / 2;
      const py = gridPos.y * cellH + cellH / 2;
      const playerSize = Math.min(cellW, cellH) * 0.7;

      if (isPlayerImgLoaded) {
        ctx.drawImage(
          playerImg,
          px - playerSize / 2,
          py - playerSize / 2,
          playerSize,
          playerSize
        );
      } else {
        ctx.fillStyle = '#00b894';
        ctx.beginPath();
        ctx.arc(px, py, playerSize / 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function handleMove(e) {
      if (!isDragging || gameWon) return;

      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      const touchX = (clientX - rect.left) * (canvas.width / rect.width);
      const touchY = (clientY - rect.top) * (canvas.height / rect.height);

      const currentPX = gridPos.x * cellW + cellW / 2;
      const currentPY = gridPos.y * cellH + cellH / 2;

      const dx = touchX - currentPX;
      const dy = touchY - currentPY;

      let nextX = gridPos.x;
      let nextY = gridPos.y;

      const thresholdX = cellW * 0.25;
      const thresholdY = cellH * 0.25;

      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > thresholdX) nextX++;
        else if (dx < -thresholdX) nextX--;
      } else {
        if (dy > thresholdY) nextY++;
        else if (dy < -thresholdY) nextY--;
      }

      if (
        nextY >= 0 && nextY < rows && nextX >= 0 && nextX < cols &&
        grid[nextY][nextX] === 0
      ) {
        if (gridPos.x !== nextX || gridPos.y !== nextY) {
          gridPos.x = nextX;
          gridPos.y = nextY;
          draw(); // Мгновенный жесткий сдвиг
          checkWin();
        }
      }
    }

    function startDrag(e) {
      isDragging = true;
      handleMove(e);
    }

    canvas.addEventListener('mousedown', startDrag);
    canvas.addEventListener('mouseup', () => isDragging = false);
    canvas.addEventListener('mousemove', handleMove);

    canvas.addEventListener('touchstart', (e) => {
      startDrag(e);
      e.preventDefault();
    }, { passive: false });
    
    canvas.addEventListener('touchend', () => isDragging = false);
    canvas.addEventListener('touchmove', (e) => {
      handleMove(e);
      e.preventDefault();
    }, { passive: false });

    function checkWin() {
      if (gridPos.x === goal.x && gridPos.y === goal.y && !gameWon) {
        gameWon = true;

        setTimeout(() => {
          document.getElementById('maze-screen').style.display = 'none';
          document.getElementById('greeting-screen').style.display = 'block';
        }, 100);
      }
    }

    function playMusic() {
      const audio = document.getElementById('bgSong');
      audio.play().catch(err => console.log("Ошибка воспроизведения:", err));
    }

    setMode('easy');
  </script>
</body>
</html>

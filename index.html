<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>С Днём Рождения!</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px;
      text-align: center;
      color: #333;
    }

    /* Экран Лабиринта */
    #maze-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    h1 {
      font-size: 1.3rem;
      color: #4a4a4a;
    }

    #maze-container {
      position: relative;
      background-color: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      padding: 8px;
      touch-action: none; /* Отключаем скролл экрана при игре */
    }

    canvas {
      display: block;
      border-radius: 8px;
      max-width: 92vw;
      max-height: 75vh; /* Оптимизировано под вертикальные экраны */
    }

    .hint {
      font-size: 0.85rem;
      color: #666;
    }

    /* Экран Поздравления */
    #greeting-screen {
      display: none;
      max-width: 500px;
      width: 90%;
      background: rgba(255, 255, 255, 0.95);
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      animation: fadeIn 1.2s ease-in-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .photo {
      width: 100%;
      max-width: 320px;
      height: auto;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      margin: 15px 0;
      object-fit: cover;
    }

    audio {
      width: 100%;
      margin-top: 15px;
      border-radius: 30px;
    }

    .message {
      font-size: 1.05rem;
      line-height: 1.5;
      color: #444;
      white-space: pre-line;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <!-- 1. ИГРОВОЙ ЭКРАН -->
  <div id="maze-screen">
    <h1>Пройди лабиринт, чтобы открыть подарок! 🎁</h1>
    <div id="maze-container">
      <canvas id="mazeCanvas" width="375" height="525"></canvas>
    </div>
    <p class="hint">Веди пальцем или мышкой по лабиринту ✨</p>
  </div>

  <!-- 2. ЭКРАН ПОЗДРАВЛЕНИЯ -->
  <div id="greeting-screen">
    <h1>🎉 С Днём Рождения! 🎉</h1>
    
    <!-- Главное фото (photo.png) -->
    <img src="photo.png" alt="Поздравление" class="photo">
    
    <!-- Текст поздравления -->
    <div class="message">
      Пусть каждый день приносит радость, вдохновение и исполнение всех желаний!
      Спасибо, что ты есть ❤️
    </div>

    <!-- Твоя песня (song.mp3) -->
    <audio id="bgSong" controls preload="auto">
      <source src="song.mp3" type="audio/mpeg">
      Ваш браузер не поддерживает аудио.
    </audio>
  </div>

  <script>
    const canvas = document.getElementById('mazeCanvas');
    const ctx = canvas.getContext('2d');

    // Картинка персонажа (hero.png)
    const playerImg = new Image();
    let isPlayerImgLoaded = false;
    playerImg.src = 'hero.png';
    playerImg.onload = () => { isPlayerImgLoaded = true; };

    // Размеры сетки (нечётные для идеальной генерации стен)
    const cols = 25;
    const rows = 35;
    const cellSize = canvas.width / cols;

    // Инициализация сетки (1 = стена, 0 = проход)
    const grid = Array.from({ length: rows }, () => Array(cols).fill(1));

    // АЛГОРИТМ DFS: Генерация гарантированно проходимого лабиринта с 1 верным путем
    function generateMaze(r, c) {
      grid[r][c] = 0;

      // Возможные направления движения (вверх, вниз, влево, вправо) на 2 клетки
      const dirs = [
        [-2, 0], [2, 0], [0, -2], [0, 2]
      ].sort(() => Math.random() - 0.5); // Перемешиваем направления

      for (let [dr, dc] of dirs) {
        const nr = r + dr;
        const nc = c + dc;

        if (nr > 0 && nr < rows - 1 && nc > 0 && nc < cols - 1 && grid[nr][nc] === 1) {
          grid[r + dr / 2][c + dc / 2] = 0; // Ломаем стену между клетками
          generateMaze(nr, nc);
        }
      }
    }

    // Генерируем лабиринт начиная со старта
    generateMaze(1, 1);
    grid[0][1] = 0; // Точный вход
    grid[rows - 1][cols - 2] = 0; // Точный выход

    let gridPos = { x: 1, y: 0 };
    // Позиция для отрисовки
    let renderPos = { x: 1 * cellSize + cellSize / 2, y: cellSize / 2 };
    // Скорость для скольжения
    let velocity = { x: 0, y: 0 };

    const goal = { x: cols - 2, y: rows - 1 };
    let isDragging = false;
    let gameWon = false;

    // Предварительная подготовка аудио для разблокировки автозапуска
    const audio = document.getElementById('bgSong');
    document.addEventListener('touchstart', unlockAudio, { once: true });
    document.addEventListener('mousedown', unlockAudio, { once: true });

    function unlockAudio() {
      audio.load();
    }

    // Анимация движения с физикой скольжения
    function animate() {
      const targetX = gridPos.x * cellSize + cellSize / 2;
      const targetY = gridPos.y * cellSize + cellSize / 2;

      const accel = 0.12;
      const friction = 0.82;

      velocity.x = (velocity.x + (targetX - renderPos.x) * accel) * friction;
      velocity.y = (velocity.y + (targetY - renderPos.y) * accel) * friction;

      renderPos.x += velocity.x;
      renderPos.y += velocity.y;

      draw();

      if (!gameWon) {
        requestAnimationFrame(animate);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Стены
      ctx.fillStyle = '#6c5ce7';
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (grid[r][c] === 1) {
            ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
          }
        }
      }

      // Финиш
      ctx.fillStyle = '#ff7675';
      ctx.beginPath();
      ctx.arc(
        goal.x * cellSize + cellSize / 2,
        goal.y * cellSize + cellSize / 2,
        cellSize / 2.5, 0, Math.PI * 2
      );
      ctx.fill();

      // Персонаж (hero.png или зелёный кружок)
      const playerSize = cellSize * 1.1;
      if (isPlayerImgLoaded) {
        ctx.drawImage(
          playerImg,
          renderPos.x - playerSize / 2,
          renderPos.y - playerSize / 2,
          playerSize,
          playerSize
        );
      } else {
        ctx.fillStyle = '#00b894';
        ctx.beginPath();
        ctx.arc(renderPos.x, renderPos.y, cellSize * 0.4, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function handleMove(e) {
      if (!isDragging || gameWon) return;

      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      const touchX = (clientX - rect.left) * (canvas.width / rect.width);
      const touchY = (clientY - rect.top) * (canvas.height / rect.height);

      const targetC = Math.floor(touchX / cellSize);
      const targetR = Math.floor(touchY / cellSize);

      if (targetR >= 0 && targetR < rows && targetC >= 0 && targetC < cols) {
        const isNeighbor = Math.abs(targetR - gridPos.y) + Math.abs(targetC - gridPos.x) <= 1;
        if (isNeighbor && grid[targetR][targetC] === 0) {
          gridPos.x = targetC;
          gridPos.y = targetR;
          checkWin();
        }
      }
    }

    canvas.addEventListener('mousedown', () => isDragging = true);
    canvas.addEventListener('mouseup', () => isDragging = false);
    canvas.addEventListener('mousemove', handleMove);

    canvas.addEventListener('touchstart', (e) => {
      isDragging = true;
      handleMove(e);
      e.preventDefault();
    }, { passive: false });
    
    canvas.addEventListener('touchend', () => isDragging = false);
    canvas.addEventListener('touchmove', (e) => {
      handleMove(e);
      e.preventDefault();
    }, { passive: false });

    function checkWin() {
      if (gridPos.x === goal.x && gridPos.y === goal.y && !gameWon) {
        gameWon = true;

        setTimeout(() => {
          document.getElementById('maze-screen').style.display = 'none';
          document.getElementById('greeting-screen').style.display = 'block';

          const playPromise = audio.play();
          if (playPromise !== undefined) {
            playPromise.catch(error => {
              console.log("Автозапуск заблокирован", error);
            });
          }
        }, 200);
      }
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
